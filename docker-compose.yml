services:
  mcp-browser-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-multi-session-browser:latest
    container_name: mcp-browser-server
    # CRITICAL: equivalent to --init flag. Enables tini to correctly forward
    # signals and reap child processes generated by xvfb-run.
    init: true
    ports:
      - "8000:8000"
    environment:
      - FASTMCP_HOST=0.0.0.0
      - FASTMCP_PORT=8000
      # Use streamable-http as default transport (SSE fallback available via 'sse')
      - MCP_TRANSPORT=streamable-http
      # Must be false so Playwright runs the headful browser inside Xvfb (bypasses bot protection)
      - BROWSER_HEADLESS=false
    command: xvfb-run --server-args="-screen 0 1920x1080x24" uv run main.py
    restart: unless-stopped
